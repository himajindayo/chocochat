name: Extract ChocoChat ZIP

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract ZIP and remove archive
        run: |
          unzip -o chocochat.zip -d .
          rm -f chocochat.zip

      - name: Delete this workflow
        run: |
          rm -f .github/workflows/unzip-chocochat.yml

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Extract chocochat.zip and remove workflow"
          git push
