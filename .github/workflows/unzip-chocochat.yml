name: Extract ChocoChat ZIP

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract ZIP and move contents to root
        run: |
          unzip -o chocochat.zip -d .
          rm -f chocochat.zip

          shopt -s dotglob nullglob
          mv choco-chat-refactored/* .
          rmdir choco-chat-refactored

      - name: Delete this workflow
        run: |
          rm -f .github/workflows/unzip-chocochat.yml

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            exit 0
          fi

          git commit -m "Extract chocochat.zip and remove workflow"
          git push
