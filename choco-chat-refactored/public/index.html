<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Choco Chat</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body data-theme="system">

<!-- 認証 -->
<div id="auth-section">
  <div class="auth-box">
    <h1>🍫 Choco Chat</h1>

    <div id="login-form" class="auth-form active">
      <input type="text"     id="l-uid"  placeholder="ユーザーID"  maxlength="20" autocomplete="username">
      <input type="password" id="l-pass" placeholder="パスワード" autocomplete="current-password">
      <button class="btn-primary" id="login-btn">ログイン</button>
      <div class="auth-link"><a id="to-signup">新規登録</a></div>
    </div>

    <div id="signup-form" class="auth-form">
      <input type="text"     id="s-uid"   placeholder="ユーザーID（半角英数字 4〜20文字）" maxlength="20" autocomplete="username">
      <input type="text"     id="s-uname" placeholder="ユーザー名（表示名）" maxlength="20">
      <input type="password" id="s-pass"  placeholder="パスワード（4文字以上）" autocomplete="new-password">
      <input type="password" id="s-pass2" placeholder="パスワード（確認）"     autocomplete="new-password">
      <button class="btn-primary" id="signup-btn">アカウント作成</button>
      <div class="auth-link"><a id="to-login">ログインはこちら</a></div>
    </div>

    <div id="auth-msg"></div>
  </div>
</div>

<!-- チャット -->
<div id="chat-section" class="hidden">
  <div id="new-msg-notice" class="hidden">↓ 新着</div>

  <div class="chat-header"><h1>🍫 Choco Chat</h1></div>

  <div class="user-bar">
    <span id="disp-uid"    class="uid-label"></span>
    <span id="disp-uname"  class="uname-label"></span>
    <span id="admin-badge" class="admin-badge hidden">ADMIN</span>
  </div>
  <div class="online-bar"><span id="u-count">0</span>人 <span id="u-names"></span></div>
  <div id="typing"></div>

  <div id="chat-box"></div>

  <div id="reply-bar" class="hidden">
    <span id="reply-text"></span>
    <button id="cancel-reply">✕</button>
  </div>

  <textarea id="msg-input" maxlength="200" placeholder="メッセージ…"></textarea>
  <div class="char-bar"><span id="char-count">0</span>/200</div>
  <div class="btn-row">
    <button id="send-btn">送信</button>
    <button id="omi-btn">おみくじ🎴</button>
    <button id="sys-toggle">入退室 ON</button>
    <button id="logout-btn">ログアウト</button>
  </div>

  <!-- 設定 -->
  <div id="profile-box">
    <h3>設定</h3>
    <div class="prow"><label>ユーザー名</label><input type="text"  id="p-uname" maxlength="20"></div>
    <div class="prow"><label>名前の色</label>  <input type="color" id="p-color" value="#000000"></div>
    <div class="prow"><label>ステータス</label><input type="text"  id="p-status" maxlength="30"></div>
    <div class="prow"><label>テーマ</label>
      <select id="p-theme">
        <option value="system">システム</option>
        <option value="dark">ダーク</option>
        <option value="light">ライト</option>
      </select>
    </div>
    <button id="save-profile">更新</button>
  </div>

  <!-- 管理者パネル（管理者のみ表示） -->
  <div id="admin-panel" class="hidden">
    <h3>管理者パネル</h3>
    <button class="adm-btn" id="toggle-ip">オンラインIP</button>
    <button class="adm-btn" id="toggle-hist">IP履歴</button>
    <div id="ip-list"    class="hidden"></div>
    <div id="ip-history" class="hidden"></div>
  </div>
</div>

<!-- 編集モーダル -->
<div id="edit-modal" class="modal hidden">
  <div class="modal-inner">
    <h3>編集</h3>
    <textarea id="edit-input" maxlength="200"></textarea>
    <div class="modal-btns">
      <button id="save-edit">保存</button>
      <button id="cancel-edit">キャンセル</button>
    </div>
  </div>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="/js/init.js"></script>
<script src="/js/theme.js"></script>
<script src="/js/util.js"></script>
<script src="/js/messages.js"></script>
<script src="/js/admin.js"></script>
<script src="/js/ui.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/chat.js"></script>
<script src="/js/events.js"></script>
</body>
</html>
